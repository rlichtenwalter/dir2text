repos:
  # --- Commit stage: formatting + file hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
      - id: debug-statements
      - id: no-commit-to-branch
        args: [--branch, main, --branch, develop]

  - repo: local
    hooks:
      # --- Commit stage: formatting ---
      - id: ruff-fix
        name: Ruff fix
        entry: uv run ruff check --fix src tests
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format src tests
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      # --- Push stage: linting + type checking + tests ---
      - id: lint
        name: Linting
        entry: uv run ruff check src tests
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: format-check
        name: Format check
        entry: uv run ruff format --check src tests
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: typecheck
        name: Type checking
        entry: uv run pyright src
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: test
        name: Unit Tests
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: integration
        name: CLI Integration Tests
        entry: uv run pytest tests/integration/test_cli.py --run-cli-tests
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
