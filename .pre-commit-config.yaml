repos:
  # --- Commit stage: formatting + file hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
      - id: debug-statements

  - repo: local
    hooks:
      # --- Commit stage: formatting ---
      - id: tox-format
        name: Formatting
        entry: tox -e format
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      # --- Push stage: linting + tests ---
      - id: tox-lint
        name: Linting
        entry: tox -e lint
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: tox-test
        name: Unit Tests
        entry: tox -e test
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: tox-integration
        name: CLI Integration Tests
        entry: tox -e integration
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
