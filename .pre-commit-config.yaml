repos:
-   repo: local
    hooks:
    -   id: tox-format
        name: Formatting
        entry: tox -e format
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
    -   id: tox-lint
        name: Linting
        entry: tox -e lint
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
    -   id: tox-test
        name: Unit Tests
        entry: tox -e test
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
    -   id: tox-integration
        name: CLI Integration Tests
        entry: tox -e integration
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
