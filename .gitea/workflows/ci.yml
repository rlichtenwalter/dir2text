# dir2text CI Pipeline
#
# Runs on every push and pull request to ensure code quality.
# Uses uv for dependency management and task orchestration.
#
# Gitea Actions is compatible with GitHub Actions syntax.
# See: https://docs.gitea.com/usage/actions/overview

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Quality (pre-commit run --all-files at both stages)
  # ==========================================================================
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv + pre-commit
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install dev + all extras (needed for make test invoked by pre-push hook)
        run: uv sync --group dev --extra all
      # SKIP no-commit-to-branch: that hook guards local commits to protected
      # branches; in CI it fires spuriously whenever the workflow checks out
      # develop or main.
      - run: uvx --with pre-commit==4.5.1 pre-commit run --all-files --hook-stage pre-commit
        env:
          SKIP: no-commit-to-branch
      - run: uvx --with pre-commit==4.5.1 pre-commit run --all-files --hook-stage pre-push
        env:
          SKIP: no-commit-to-branch

  # ==========================================================================
  # Lint & Format Check
  # ==========================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev --extra all

      - name: Run ruff linter
        run: uv run ruff check src/ tests/

      - name: Check formatting
        run: uv run ruff format --check src/ tests/

  # ==========================================================================
  # Type Check
  # ==========================================================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev --extra all

      - name: Run pyright
        run: uv run pyright src/

  # ==========================================================================
  # Test Matrix
  # ==========================================================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev --extra all

      - name: Run tests
        run: uv run pytest tests/ -v

  # ==========================================================================
  # Build Check
  # ==========================================================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build package
        run: uv build

      - name: Verify wheel
        run: |
          python -m venv verify-venv
          verify-venv/bin/pip install dist/dir2text-*.whl
          verify-venv/bin/python -c "import dir2text; print(f'dir2text version: {dir2text.__version__}')"
