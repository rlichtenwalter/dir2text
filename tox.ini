[tox]
isolated_build = true
envlist = py39, py310, py311, py312, lint, typecheck

[testenv]
skip_install = true
allowlist_externals = poetry
commands_pre =
    poetry install -E all --with dev
commands =
    pytest

[testenv:format]
description = Format code with ruff
commands =
    poetry run ruff check --fix src tests
    poetry run ruff format src tests

[testenv:check-format]
description = Check formatting without modifying
commands =
    poetry run ruff format --check src tests

[testenv:lint]
description = Lint and check formatting
commands =
    poetry run ruff check src tests
    poetry run ruff format --check src tests

[testenv:typecheck]
description = Run pyright type checker
commands =
    poetry run pyright src

[testenv:test]
description = Run unit tests
commands =
    poetry run pytest

[testenv:integration]
description = Run CLI integration tests
commands =
    poetry run pytest {posargs} tests/integration/test_cli.py --run-cli-tests

[testenv:coverage]
description = Run tests with coverage
commands =
    poetry run pytest --cov=dir2text --cov-report=xml
